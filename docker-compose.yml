services:
  frontend:
    image: node:24-slim
    container_name: blissful_babbage
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      AGENT_API_URL: http://host.docker.internal:8000
      HOST_IP: ${HOST_IP:-}
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      DEFAULT_CUBE_ADDRESS: Provider=MSOLAP;Data Source=10.0.57.86;Initial Catalog=CB_BI_FlotHs;
      NUXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      NUXT_DEVTOOLS: "false"
    volumes:
      - ./frontend_ui:/app
      - frontend_node_modules:/app/node_modules
      - frontend_nuxt:/app/.nuxt
      - frontend_output:/app/.output
    command:
      - sh
      - -c
      - |
        set -e
        echo "==> Detectar gateway Docker"
        export DOCKER_GATEWAY=$$(ip route show default 2>/dev/null | awk '{print $$3}')
        echo "    DOCKER_GATEWAY=$$DOCKER_GATEWAY"
        echo "    HOST_IP=$$HOST_IP"
        echo "    AGENT_API_URL=$$AGENT_API_URL"

        echo "==> Escribir .env para Nuxt"
        {
          echo "AGENT_API_URL=$$AGENT_API_URL"
          echo "DOCKER_GATEWAY=$$DOCKER_GATEWAY"
          [ -n "$$HOST_IP" ] && echo "HOST_IP=$$HOST_IP"
        } > /app/.env

        echo "==> Probar conectividad al backend"
        node -e '
          const hosts = [
            process.env.AGENT_API_URL?.replace(/\/$/, ""),
            process.env.HOST_IP ? "http://" + process.env.HOST_IP + ":8000" : null,
            process.env.DOCKER_GATEWAY ? "http://" + process.env.DOCKER_GATEWAY + ":8000" : null,
            "http://host.docker.internal:8000",
            "http://gateway.docker.internal:8000",
            "http://172.17.0.1:8000",
          ].filter(Boolean);
          const unique = [...new Set(hosts)];
          (async () => {
            for (const base of unique) {
              const url = base + "/health";
              try {
                const r = await fetch(url, { signal: AbortSignal.timeout(4000) });
                if (r.ok) {
                  console.log("CONECTIVIDAD OK:", base);
                  const fs = require("fs");
                  let env = "AGENT_API_URL=" + base + "\nDOCKER_GATEWAY=" + (process.env.DOCKER_GATEWAY || "") + "\n";
                  if (process.env.HOST_IP) env += "HOST_IP=" + process.env.HOST_IP + "\n";
                  fs.writeFileSync("/app/.env", env);
                  process.exit(0);
                }
                console.log("HTTP", r.status, base);
              } catch (e) {
                console.log("FALLO", base, "-", e.message);
              }
            }
            console.log("");
            console.log("ERROR: Ninguna URL alcanza el backend.");
            console.log("  1) uvicorn agent_api.main:app --host 0.0.0.0 --port 8000");
            console.log("  2) scripts/docker-up.ps1");
            console.log("  3) scripts/run_frontend.bat (sin Docker)");
            process.exit(0);
          })();
        ' || true

        echo "==> npm install"
        npm install --ignore-scripts
        echo "==> limpiar caches"
        find /app/.nuxt -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
        find /app/.output -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
        rm -rf /app/node_modules/.cache/vite 2>/dev/null || true
        echo "==> nuxt prepare"
        npx nuxt prepare
        test -d /app/.nuxt
        echo "==> nuxt dev"
        exec npx nuxt dev --host 0.0.0.0 --port 3000
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  frontend_node_modules:
  frontend_nuxt:
  frontend_output:
